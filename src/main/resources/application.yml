spring:
  application:
    name: resume-jobTracker
  datasource:
    url: jdbc:postgresql://localhost:5432/resumetracker
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
